<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">CityDots · 城迹</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1B1814;
    color: #E4D9CC;
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    height: 100vh;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  .container {
    display: flex;
    height: 100vh;
  }

  .sidebar {
    width: 300px;
    background: rgba(27, 24, 20, 0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-right: 1px solid rgba(212, 184, 150, 0.1);
    display: flex;
    flex-direction: column;
    padding: 28px 24px;
    flex-shrink: 0;
    z-index: 10;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 36px;
  }
  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #D4B896, #E8D5A3, #C9A67A);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(212, 184, 150, 0.2);
  }
  .logo-text {
    font-size: 22px;
    font-weight: 500;
    color: #D4B896;
    letter-spacing: 6px;
    font-family: "Noto Serif SC", "Source Han Serif SC", "STSong", "Songti SC", serif;
  }
  .lang-btn {
    margin-left: auto;
    padding: 5px 12px;
    background: transparent;
    border: 1px solid rgba(212, 184, 150, 0.15);
    color: #8B7D6B;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    letter-spacing: 1px;
    transition: all 0.25s;
    flex-shrink: 0;
  }
  .lang-btn:hover {
    border-color: #D4B896;
    color: #D4B896;
    background: rgba(212, 184, 150, 0.06);
  }

  .stat-card {
    background: rgba(212, 184, 150, 0.04);
    border: 1px solid rgba(212, 184, 150, 0.08);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 10px;

  .stat-label {
    font-size: 11px;
    color: #8B7D6B;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .stat-value {
    font-size: 32px;
    font-weight: 300;
    color: #D4B896;
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
    font-family: "Noto Serif SC", "Source Han Serif SC", "STSong", serif;
  }
  .stat-sub {
    font-size: 11px;
    color: #6B5F52;
    margin-top: 2px;
  }

  .city-list {
    flex: 1;
    overflow-y: auto;
    margin-top: 8px;
  }
  .city-list::-webkit-scrollbar { width: 3px; }
  .city-list::-webkit-scrollbar-thumb { background: rgba(212, 184, 150, 0.15); border-radius: 2px; }

  .city-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 12px;
    margin-bottom: 3px;
    border-radius: 8px;
    background: rgba(212, 184, 150, 0.03);
    font-size: 13px;
    color: #A69888;
    transition: background 0.2s;
  }
  .city-item:hover { background: rgba(212, 184, 150, 0.06); }
  .city-item .province {
    font-size: 11px;
    color: #6B5F52;
  }
  .city-item .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #D4B896;
    box-shadow: 0 0 6px rgba(212, 184, 150, 0.4);
  }

  .reset-btn {
    margin-top: 16px;
    padding: 10px;
    background: transparent;
    border: 1px solid rgba(212, 184, 150, 0.1);
    color: #8B7D6B;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    letter-spacing: 2px;
    transition: all 0.25s;
  }
  .reset-btn:hover {
    border-color: rgba(212, 184, 150, 0.3);
    color: #D4B896;
    background: rgba(212, 184, 150, 0.04);
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    perspective: 1200px;
  }

  .landmark-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    background-color: #1B1814;
    opacity: 0;
    transition: opacity 1s ease;
    z-index: 0;
    pointer-events: none;
  }
  .landmark-bg.show { opacity: 0.7; }
  .landmark-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(27,24,20,0.3) 100%);
  }

  .glass-pane {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: rgba(235, 228, 216, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.04);
  }

  .header {
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid rgba(212, 184, 150, 0.08);
    background: rgba(27, 24, 20, 0.7);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 10;
    position: relative;
  }
  .header-title {
    font-size: 15px;
    color: #A69888;
    letter-spacing: 4px;
    font-weight: 400;
    font-family: "Noto Serif SC", "Source Han Serif SC", "STSong", serif;
  }
  .header-hint {
    font-size: 13px;
    color: #6B5F52;
    margin-left: auto;
  }
  .header-hint span { color: #D4B896; }

  .back-btn {
    display: none;
    padding: 6px 16px;
    background: transparent;
    border: 1px solid rgba(212, 184, 150, 0.25);
    color: #D4B896;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    letter-spacing: 1px;
    transition: all 0.25s;
  }
  .back-btn:hover { background: rgba(212, 184, 150, 0.08); }
  .back-btn.show { display: block; }

  #map {
    flex: 1;
    transform: rotateX(3deg);
    transform-origin: center center;
    margin: -8px 0 -16px 0;
    z-index: 2;
    position: relative;
  }

  .glass-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 3;
    background:
      radial-gradient(ellipse at 60% 15%, rgba(232, 213, 163, 0.04) 0%, transparent 45%),
      radial-gradient(ellipse at 50% 100%, rgba(212, 184, 150, 0.05) 0%, transparent 35%);
  }

  .toast {
    position: fixed;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 28px;
    background: rgba(30, 27, 23, 0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(212, 184, 150, 0.2);
    color: #D4B896;
    border-radius: 10px;
    font-size: 13px;
    letter-spacing: 1px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 100;
  }

  .legend {
    position: absolute;
    bottom: 24px;
    right: 32px;
    display: flex;
    gap: 24px;
    z-index: 5;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: #8B7D6B;
    letter-spacing: 1px;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 3px;
  }

  .footer {
    position: absolute;
    bottom: 14px;
    left: 28px;
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 11px;
    z-index: 5;
  }
  .footer a {
    color: #6B5F52;
    text-decoration: none;
    letter-spacing: 0.5px;
    transition: color 0.25s;
  }
  .footer a:hover { color: #D4B896; }
  .footer-divider { color: rgba(212, 184, 150, 0.12); }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(12, 10, 8, 0.85);
    z-index: 200;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: rgba(30, 27, 23, 0.97);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(212, 184, 150, 0.15);
    border-radius: 14px;
    width: 90%;
    max-width: 500px;
    max-height: 70vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 22px;
    border-bottom: 1px solid rgba(212, 184, 150, 0.08);
  }
  .modal-title {
    color: #D4B896;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 2px;
  }
  .modal-close {
    background: none;
    border: none;
    color: #8B7D6B;
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    transition: color 0.2s;
  }
  .modal-close:hover { color: #D4B896; }
  .modal-body {
    padding: 22px;
    color: #A69888;
    font-size: 13px;
    line-height: 1.9;
  }
  .modal-body a {
    color: #D4B896;
    text-decoration: none;
  }
  .modal-body a:hover { text-decoration: underline; }

  .ripple {
    position: absolute;
    width: 24px; height: 24px;
    border: 2px solid rgba(212, 184, 150, 0.9);
    border-radius: 50%;
    pointer-events: none;
    z-index: 50;
    animation: ripple-expand 1.2s ease-out forwards;
  }
  @keyframes ripple-expand {
    0%   { transform: translate(-50%, -50%) scale(0); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(8); opacity: 0; }
  }


  .diary-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(12, 10, 8, 0.6);
    z-index: 150;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .diary-overlay.show { display: flex; }
  .diary-popup {
    background: rgba(30, 27, 23, 0.97);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(212, 184, 150, 0.15);
    border-radius: 14px;
    width: 90%;
    max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    overflow: hidden;
    animation: diary-slide-up 0.3s ease-out;
  }
  @keyframes diary-slide-up {
    0%   { transform: translateY(20px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }
  .diary-header {
    padding: 18px 22px 10px;
    color: #D4B896;
    font-size: 15px;
    letter-spacing: 2px;
    font-family: "Noto Serif SC", "Source Han Serif SC", "STSong", serif;
  }
  .diary-city-name {
    color: #E8D5A3;
  }
  .diary-body {
    padding: 0 22px 18px;
  }
  .diary-date {
    width: 100%;
    padding: 10px 14px;
    background: rgba(212, 184, 150, 0.06);
    border: 1px solid rgba(212, 184, 150, 0.12);
    border-radius: 8px;
    color: #D4B896;
    font-size: 14px;
    font-family: inherit;
    margin-bottom: 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  .diary-date:focus { border-color: rgba(212, 184, 150, 0.35); }
  .diary-date::-webkit-calendar-picker-indicator { filter: invert(0.7) sepia(1) saturate(0.5) hue-rotate(330deg); }
  .diary-note {
    width: 100%;
    padding: 10px 14px;
    background: rgba(212, 184, 150, 0.06);
    border: 1px solid rgba(212, 184, 150, 0.12);
    border-radius: 8px;
    color: #D4B896;
    font-size: 13px;
    font-family: inherit;
    resize: none;
    height: 56px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }
  .diary-note:focus { border-color: rgba(212, 184, 150, 0.35); }
  .diary-note::placeholder { color: rgba(180, 160, 140, 0.3); }
  .diary-actions {
    display: flex;
    gap: 10px;
    padding: 0 22px 18px;
  }
  .diary-btn {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    letter-spacing: 1px;
    transition: all 0.25s;
    font-family: inherit;
  }
  .diary-btn-save {
    background: linear-gradient(135deg, rgba(212,184,150,0.25), rgba(180,145,100,0.2));
    border: 1px solid rgba(212, 184, 150, 0.3);
    color: #D4B896;
  }
  .diary-btn-save:hover { background: rgba(212, 184, 150, 0.25); border-color: rgba(212, 184, 150, 0.5); }
  .diary-btn-skip {
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.06);
    color: #6B5F52;
  }
  .diary-btn-skip:hover { border-color: rgba(255, 255, 255, 0.15); color: #8B7D6B; }
  .city-note-dot {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #E8D5A3;
    margin-left: 6px;
    vertical-align: middle;
    box-shadow: 0 0 4px rgba(232, 213, 163, 0.5);
  }

</style>
</head>
<body>

<div class="container">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">✈</div>
      <div class="logo-text" id="logoText">城迹</div>
      <button class="lang-btn" onclick="toggleLang()" title="Switch Language" id="langBtn">EN</button>
    </div>

    <div class="stat-card">
      <div class="stat-label" id="statVisitedLabel">已访问城市</div>
      <div class="stat-value" id="visitedCount">0</div>
      <div class="stat-sub" id="coverageText">覆盖 0 个省份</div>
    </div>

    <div class="stat-card">
      <div class="stat-label" id="statRateLabel">探索率</div>
      <div class="stat-value" id="exploreRate">0%</div>
      <div class="stat-sub" id="statTotalLabel">全国约 370 个地级市</div>
    </div>

    <div class="city-list" id="cityList">
      <div style="color:#444;text-align:center;padding:20px;">点击地图上的城市<br>开始记录旅程</div>
    </div>

    <button class="reset-btn" id="resetBtn" onclick="resetAll()">清 空 记 录</button>
  </aside>

  <div class="main">
    <div class="landmark-bg" id="landmarkBg"></div>
    <div class="glass-pane"></div>
    <div class="header">
      <span class="header-title" id="headerTitle">中 国</span>
      <button class="back-btn" id="backBtn" onclick="backToChina()">← 返回全国</button>
      <span class="header-hint" id="headerHint">点击城市标记 <span>已到达</span></span>
    </div>
    <div class="glass-overlay"></div>
    <div id="map"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:rgba(255,248,240,0.06);border:1px solid rgba(255,255,255,0.06)"></div> <span id="legendNotVisited">未到达</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(135deg,#D4B896,#E8D5A3)"></div> <span id="legendVisited">已到达</span></div>
    </div>
    <div class="footer">
      <a href="#" onclick="showModal('privacy');return false;" id="footerPrivacy">隐私政策</a>
      <span class="footer-divider">|</span>
      <a href="#" onclick="showModal('about');return false;" id="footerAbout">关于我们</a>
      <span class="footer-divider">|</span>
      <a href="mailto:sydneyjiang00@gmail.com" id="footerContact">联系我们</a>
    </div>
  </div>
</div>


<div class="diary-overlay" id="diaryOverlay">
  <div class="diary-popup" onclick="event.stopPropagation()">
    <div class="diary-header">到达 <span class="diary-city-name" id="diaryCityName"></span></div>
    <div class="diary-body">
      <input type="date" class="diary-date" id="diaryDate">
      <input type="text" class="diary-note" id="diaryNote" placeholder="写一句话… 比如：和朋友骑车到西湖边">
    </div>
    <div class="diary-actions">
      <button class="diary-btn diary-btn-skip" onclick="saveDiary(true)">只标记</button>
      <button class="diary-btn diary-btn-save" onclick="saveDiary(false)">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

  en: {

    modalAboutBody: '<p style="font-size:15px;color:#D4B896;margin-bottom:16px;">Every journey leaves a mark. Every city tells a story.</p><p>城迹 transforms the map of China into a canvas for your memories — each city you visit becomes a point of light, a quiet reminder of where you have been and who you were when you arrived.</p><p>Pin the bustling streets of a megacity. Trace the mist-shrouded peaks of a mountain town. Let the map fill slowly, intentionally, one trip at a time. No gamification. No social noise. Just you and the places that shaped you.</p><p>A personal cartography of discovery. Minimalist. Intentional. Yours.</p>'

};

function t(key, params) {
  let text = i18n[lang][key] || key;
  if (params) {
    Object.keys(params).forEach(k => {
      text = text.replace('{' + k + '}', params[k]);
    });
  }
  return text;
}

function toggleLang() {
  lang = lang === 'zh' ? 'en' : 'zh';
  localStorage.setItem(LANG_KEY, lang);
  refreshAllUI();
}

function showModal(type) {
  document.getElementById('modalTitle').textContent = t('modal' + type.charAt(0).toUpperCase() + type.slice(1) + 'Title');
  document.getElementById('modalBody').innerHTML = t('modal' + type.charAt(0).toUpperCase() + type.slice(1) + 'Body');
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

// ========== State ==========
const STORAGE_KEY = 'china-travel-visited';
const MAP_KEY = 'china-travel-city-province';
const COORDS_KEY = 'china-travel-city-coords';
function loadVisited() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return {};
  try {
    const data = JSON.parse(raw);
    if (Array.isArray(data)) {
      const m = {};
      data.forEach(function(n) { m[n] = { date: '', note: '' }; });
      return m;
    }
    return data;
  } catch(e) { return {}; }
}
let visited = loadVisited();
let cityProvinceMap = JSON.parse(localStorage.getItem(MAP_KEY) || '{}');
let cityCoords = JSON.parse(localStorage.getItem(COORDS_KEY) || '{}');
let chinaGeoJSON = null;
let provinceGeoJSON = {};  // adcode -> GeoJSON
let currentView = 'china'; // 'china' | province adcode
let chart = null;

// ========== Init ==========
updateStaticUI();
const mapEl = document.getElementById('map');
chart = echarts.init(mapEl, null, {});
window.addEventListener('resize', () => chart.resize());

fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json')
  .then(r => r.json())
  .then(geo => {
    chinaGeoJSON = geo;
    chinaGeoJSON.features.forEach(f => {
      const name = f.properties.name;
      const adcode = String(f.properties.adcode || f.properties.id || '');
      if (!adcodeMap[name]) adcodeMap[name] = adcode;
      if (!adcodeNameMap[adcode]) adcodeNameMap[adcode] = name;
    });
    renderChina();
  })
  .catch(() => {
    document.getElementById('map').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#D4B896;font-size:16px;">' + t('mapError') + '</div>';
  });

const adcodeMap = {};    // province name -> adcode
const adcodeNameMap = {}; // adcode -> province name

// Province landmark images (Unsplash photo IDs, verified)
const LANDMARKS = {
  '110000': 'photo-1603120527222-33f28c2ce89e',  // Forbidden City, Beijing
  '120000': 'photo-1722078037202-5a8687b37493',  // Tianjin
  '130000': 'photo-1713909989764-a4f8f105f090',  // Chengde Mountain Resort, Hebei

  '210000': 'photo-1612780732270-a26e4ec675c3',  // Shenyang Imperial Palace, Liaoning
  '220000': 'photo-1455156218388-5e61b526818b',  // Changbai Mountain, Jilin

  '810000': 'photo-1576788369575-4ab045b9287e',  // Victoria Harbour, Hong Kong
  '820000': 'photo-1555331446-0ff637678740',  // Macau
};

const landmarkCache = {};

function landmarkUrl(adcode) {
  if (landmarkCache[adcode]) return landmarkCache[adcode];
  const photoRef = LANDMARKS[adcode];
  if (!photoRef) return null;
  return `https://images.unsplash.com/${photoRef}?w=1600&q=80`;
}

function setLandmarkBg(adcode) {
  const bg = document.getElementById('landmarkBg');
  const url = landmarkUrl(adcode);
  if (!url) {
    bg.style.backgroundImage = 'none';
    bg.classList.remove('show');
    return;
  }
  const img = new Image();
  img.onload = function () {
    landmarkCache[adcode] = `url(${url})`;
    bg.style.backgroundImage = `url(${url})`;
    bg.classList.add('show');
  };
  img.onerror = function () {
    bg.style.backgroundImage = 'none';
    bg.classList.remove('show');
  };
  img.src = url;
}

function clearLandmarkBg() {
  var bg = document.getElementById('landmarkBg');
  bg.classList.remove('show');
  setTimeout(function() { bg.style.backgroundImage = 'none'; }, 1000);
}

// ========== Render ==========
function renderChina() {
  currentView = 'china';
  clearLandmarkBg();
  document.getElementById('backBtn').classList.remove('show');

  echarts.registerMap('china', chinaGeoJSON);
  const option = buildMapOption('china', chinaGeoJSON.features);
  chart.setOption(option, true);
  bindClick('china');
  updateStaticUI();
  updateStats();
}

function renderProvince(adcode) {
  currentView = adcode;
  const provName = adcodeNameMap[adcode] || adcode;
  setLandmarkBg(adcode);
  document.getElementById('backBtn').classList.add('show');
  document.getElementById('headerTitle').textContent = provName;

  if (provinceGeoJSON[adcode]) {
    doRenderProvince(adcode);
    return;
  }

  showToast(t('toastLoading'));
  fetch(`https://geo.datav.aliyun.com/areas_v3/bound/${adcode}_full.json`)
    .then(r => r.json())
    .then(geo => {
      provinceGeoJSON[adcode] = geo;
      geo.features.forEach(f => {
        cityProvinceMap[f.properties.name] = adcode;
        const c = f.properties.center || f.properties.centroid;
        if (c) cityCoords[f.properties.name] = c;
      });
      localStorage.setItem(MAP_KEY, JSON.stringify(cityProvinceMap));
      localStorage.setItem(COORDS_KEY, JSON.stringify(cityCoords));
      doRenderProvince(adcode);
    })
    .catch(() => showToast(t('toastNoData')));
}

function doRenderProvince(adcode) {
  const geo = provinceGeoJSON[adcode];
  const mapName = 'province_' + adcode;
  echarts.registerMap(mapName, geo);

  const option = buildMapOption(mapName, geo.features);
  chart.setOption(option, true);
  bindClick(mapName);
}

// ========== City Dots ==========
function buildMarkPoints() {
  const points = [];
  for (const cityName of Object.keys(visited)) {
    const coords = cityCoords[cityName];
    if (coords && coords.length === 2) {
      points.push({
        name: cityName,
        coord: coords,
        symbol: 'pin',
        symbolSize: 12,
        itemStyle: {
          color: {
            type: 'radial', x: 0.5, y: 0.5, r: 0.5,
            colorStops: [
              { offset: 0, color: '#FFF8DC' },
              { offset: 0.3, color: '#E8D5A3' },
              { offset: 0.7, color: '#D4B896' },
              { offset: 1, color: 'rgba(212,184,150,0.2)' }
            ]
          },
          borderColor: 'rgba(255,230,140,0.6)',
          borderWidth: 1,
          shadowBlur: 12,
          shadowColor: 'rgba(212,175,55,0.6)'
        },
        label: {
          show: true,
          position: 'right',
          color: '#D4B896',
          fontSize: 10,
          distance: 4,
          formatter: function(p) { return p.name; }
        }
      });
    }
  }
  return points;
}

// ========== Map Option ==========
function buildMapOption(mapName, features) {
  const isChinaView = mapName === 'china';
  const data = features.map(f => {
    const name = f.properties.name;
    const isVisited = !!visited[name];

    return {
      name: name,
      itemStyle: {
        areaColor: isVisited
          ? { type: 'linear', x: 0, y: 0, x2: 1, y2: 1,
              colorStops: [
                { offset: 0, color: 'rgba(212,184,150,0.85)' },
                { offset: 0.4, color: 'rgba(232,213,163,0.75)' },
                { offset: 0.7, color: 'rgba(201,166,122,0.8)' },
                { offset: 1, color: 'rgba(180,145,100,0.85)' }
              ]}
          : { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: 'rgba(248,245,240,0.32)' }, { offset: 1, color: 'rgba(238,233,225,0.40)' }]},
        borderColor: isVisited ? 'rgba(232,213,163,0.45)' : 'rgba(255,255,255,0.1)',
        borderWidth: isVisited ? 1.2 : 0.8,
        shadowBlur: isVisited ? 14 : 1,
        shadowColor: isVisited ? 'rgba(212,184,150,0.35)' : 'rgba(0,0,0,0.06)',
        shadowOffsetY: isVisited ? 1 : 0
      },
      emphasis: {
        itemStyle: {
          areaColor: isVisited
            ? { type: 'linear', x: 0, y: 0, x2: 1, y2: 1,
                colorStops: [
                  { offset: 0, color: 'rgba(232,213,163,0.95)' },
                  { offset: 0.5, color: 'rgba(245,235,200,0.9)' },
                  { offset: 1, color: 'rgba(212,184,150,0.95)' }
                ]}
            : 'rgba(255,255,255,0.04)',
          shadowBlur: isVisited ? 20 : 0,
          shadowColor: 'rgba(212,184,150,0.5)'
        },
        label: { color: '#F0E8D8', fontSize: isChinaView ? 14 : 13 }
      }
    };
  });

  const markPoints = isChinaView ? buildMarkPoints() : [];

  return {
    tooltip: {
      trigger: 'item',
      backgroundColor: 'rgba(30,27,23,0.96)',
      borderColor: 'rgba(212,184,150,0.3)',
      padding: [10, 14],
      textStyle: { color: '#C4B8A8', fontSize: 13 },
      formatter: function(params) {
        if (!params.name) return '';
        if (params.componentType === 'markPoint') {
          var v = visited[params.name];
          var noteHtml = (v && v.note) ? '<br/><span style="color:#8B7D6B;font-size:11px">' + v.note + '</span>' : '';
          var dateHtml = (v && v.date) ? '<span style="color:#6B5F52;font-size:11px">' + v.date + ' </span>' : '';
          return dateHtml + '<span style="color:#D4B896">✦ ' + t('visited') + ': ' + params.name + '</span>' + noteHtml;
        }
        const isVisited = !!visited[params.name];
        const hint = isChinaView
          ? '<span style="color:#D4B896">' + t('tooltipDrill') + '</span>'
          : (isVisited
            ? '<span style="color:#D4B896">' + t('tooltipVisited') + '</span>'
            : '<span style="color:#8B7D6B">' + t('tooltipNotVisited') + '</span>');
        var v = visited[params.name];
        var noteHtml = (v && v.note) ? '<br/><span style="color:#8B7D6B;font-size:11px">“' + v.note + '”</span>' : '';
        return '<span style="font-size:14px;color:#fff">' + params.name + '</span><br/>' + hint + noteHtml;
      }
    },
    series: [{
      type: 'map',
      map: mapName,
      roam: true,
      scaleLimit: { min: 1, max: 8 },
      zoom: isChinaView ? 1.2 : 1,
      label: {
        show: true,
        color: 'rgba(220,210,190,0.7)',
        fontSize: isChinaView ? 11 : 13,
        fontWeight: isChinaView ? 'normal' : 'bold',
        textShadowBlur: 3,
        textShadowColor: 'rgba(0,0,0,0.6)',
        formatter: function(p) {
          if (!p.name) return '';
          const n = p.name;
          if (isChinaView) return n.length > 4 ? n.slice(0, 3) : n;
          return n.length > 4 ? n.slice(0, 3) + '..' : n;
        }
      },
      itemStyle: {
        borderColor: 'rgba(255,255,255,0.1)',
        borderWidth: 0.8,
        areaColor: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: 'rgba(248,245,240,0.32)' }, { offset: 1, color: 'rgba(238,233,225,0.40)' }] }
      },
      emphasis: {
        label: { color: '#F0E8D8' },
        itemStyle: {
          areaColor: 'rgba(255,255,255,0.05)',
          shadowBlur: 10,
          shadowColor: 'rgba(212,184,150,0.1)'
        }
      },
      selectedMode: false,
      data: data,
      markPoint: markPoints.length > 0 ? {
        silent: true,
        symbol: 'pin',
        symbolSize: 14,
        animation: true,
        animationDuration: 800,
        animationEasing: 'elasticOut',
        label: {
          show: true,
          position: 'right',
          color: '#D4B896',
          fontSize: 11,
          fontWeight: '500',
          distance: 6,
          textShadowBlur: 4,
          textShadowColor: 'rgba(0,0,0,0.6)'
        },
        itemStyle: {
          color: {
            type: 'radial', x: 0.5, y: 0.5, r: 0.5,
            colorStops: [
              { offset: 0, color: '#F5ECD7' },
              { offset: 0.25, color: '#E8D5A3' },
              { offset: 0.6, color: '#D4B896' },
              { offset: 1, color: 'rgba(212,184,150,0.15)' }
            ]
          },
          borderColor: 'rgba(232,213,163,0.5)',
          borderWidth: 1,
          shadowBlur: 12,
          shadowColor: 'rgba(212,184,150,0.35)'
        },
        data: markPoints
      } : undefined
    }]
  };
}

// ========== Interaction ==========
function bindClick(mapName) {
  chart.off('click');
  chart.on('click', function(params) {
    if (!params.name) return;

    if (currentView === 'china') {
      // Province level: drill down to cities
      const adcode = adcodeMap[params.name];
      if (adcode) {
        renderProvince(adcode);
      }
    } else {
      // City level: toggle visited
      toggleCity(params.name);
      if (!visited[params.name] || !pendingCity) {
        // Ripple on both add and remove
        showRipple(params.event.event);
      }
      // Re-render to update color
      if (!pendingCity) {
        doRenderProvince(currentView);
        updateStats();
      }
    }
  });
}

let pendingCity = null;

function toggleCity(name) {
  if (visited[name]) {
    delete visited[name];
    showToast(t('toastCancel') + name);
    saveVisited();
  } else {
    pendingCity = name;
    document.getElementById('diaryCityName').textContent = name;
    document.getElementById('diaryDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('diaryNote').value = '';
    document.getElementById('diaryOverlay').classList.add('show');
    setTimeout(function() { document.getElementById('diaryNote').focus(); }, 350);
  }
}

function saveDiary(skip) {
  var cityName = pendingCity;
  if (!cityName) return;
  var d = document.getElementById('diaryDate').value;
  var n = skip ? '' : document.getElementById('diaryNote').value.trim();
  visited[cityName] = { date: d, note: n };
  document.getElementById('diaryOverlay').classList.remove('show');
  pendingCity = null;
  showToast('✦ 到达：' + cityName);
  saveVisited();
  if (currentView === 'china') { renderChina(); }
  else { doRenderProvince(currentView); }
  updateStats();
}

document.getElementById('diaryOverlay').addEventListener('click', function() {
  if (pendingCity) {
    document.getElementById('diaryOverlay').classList.remove('show');
    var cityName = pendingCity;
    var d = document.getElementById('diaryDate').value;
    visited[cityName] = { date: d, note: '' };
    pendingCity = null;
    showToast('✦ 到达：' + cityName);
    saveVisited();
    if (currentView === 'china') { renderChina(); }
    else { doRenderProvince(currentView); }
    updateStats();
  }
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && pendingCity) {
    document.getElementById('diaryOverlay').classList.remove('show');
    var cityName = pendingCity;
    var d = document.getElementById('diaryDate').value;
    visited[cityName] = { date: d, note: '' };
    pendingCity = null;
    showToast('✦ 到达：' + cityName);
    saveVisited();
    if (currentView === 'china') { renderChina(); }
    else { doRenderProvince(currentView); }
    updateStats();
  }
});

function backToChina() {
  document.getElementById('headerTitle').textContent = t('china');
  renderChina();
}

// ========== Persistence ==========
function saveVisited() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(visited));
}

function resetAll() {
  if (Object.keys(visited).length === 0) return;
  if (confirm(t('confirmClear'))) {
    visited = {};
    saveVisited();
    if (currentView === 'china') {
      renderChina();
    } else {
      doRenderProvince(currentView);
    }
    updateStats();
    showToast(t('toastCleared'));
  }
}

// ========== Stats & UI Refresh ==========
function updateStaticUI() {
  document.getElementById('pageTitle').textContent = t('title');
  document.getElementById('logoText').textContent = t('logo');
  document.getElementById('statVisitedLabel').textContent = t('citiesVisited');
  document.getElementById('statRateLabel').textContent = t('exploreRate');
  document.getElementById('statTotalLabel').textContent = t('totalCities');
  document.getElementById('resetBtn').textContent = t('reset');
  document.getElementById('headerTitle').textContent = t('china');
  document.getElementById('backBtn').textContent = t('back');
  document.getElementById('headerHint').innerHTML = t('hint');
  document.getElementById('legendNotVisited').textContent = t('notVisited');
  document.getElementById('legendVisited').textContent = t('visited');
  document.getElementById('langBtn').textContent = t('langSwitch');
  document.getElementById('langBtn').title = t('langLabel');
  document.getElementById('footerPrivacy').textContent = t('footerPrivacy');
  document.getElementById('footerAbout').textContent = t('footerAbout');
  document.getElementById('footerContact').textContent = t('footerContact');
}

function refreshAllUI() {
  updateStaticUI();
  if (currentView === 'china') {
    renderChina();
  } else {
    document.getElementById('headerTitle').textContent = adcodeNameMap[currentView] || currentView;
    document.getElementById('backBtn').classList.add('show');
    doRenderProvince(currentView);
  }
}

function updateStats() {
  const cityNames = Object.keys(visited);
  const count = cityNames.length;
  const total = 370;
  const rate = total > 0 ? ((count / total) * 100).toFixed(1) : '0.0';

  let provWithVisits = new Set();
  for (const cityName of cityNames) {
    const provAdcode = cityProvinceMap[cityName];
    if (provAdcode) {
      provWithVisits.add(provAdcode);
    }
  }

  document.getElementById('visitedCount').textContent = count;
  document.getElementById('exploreRate').textContent = rate + '%';
  const provCount = provWithVisits.size;
  document.getElementById('coverageText').textContent =
    provCount > 0 ? t('provincesCovered', { n: provCount }) : t('provincesNone');

  const listEl = document.getElementById('cityList');
  if (count === 0) {
    listEl.innerHTML =
      '<div style="color:#444;text-align:center;padding:20px;">' + t('emptyHint') + '</div>';
    return;
  }

  const sorted = cityNames.sort(function(a, b) {
    const pa = adcodeNameMap[cityProvinceMap[a]] || '';
    const pb = adcodeNameMap[cityProvinceMap[b]] || '';
    return pa.localeCompare(pb) || a.localeCompare(b);
  });

  listEl.innerHTML = sorted.map(function(name) {
    const provAdcode = cityProvinceMap[name];
    const provName = adcodeNameMap[provAdcode] || '';
    const hasNote = visited[name] && visited[name].note;
    var noteDot = hasNote ? '<span class="city-note-dot" title="' + visited[name].note.replace(/"/g, '&quot;') + '"></span>' : '';
    var dateStr = (visited[name] && visited[name].date) ? '<span class="province">' + visited[name].date + ' · </span>' : '';
    return '<div class="city-item"><span>' + name +
      noteDot +
      '<span class="province">' + dateStr + provName + '</span></span><div class="dot"></div></div>';
  }).join('');
}


function showRipple(e) {
  var mainEl = document.querySelector('.main');
  var rect = mainEl.getBoundingClientRect();
  var x = e.clientX - rect.left;
  var y = e.clientY - rect.top;
  var ripple = document.createElement('div');
  ripple.className = 'ripple';
  ripple.style.left = x + 'px';
  ripple.style.top = y + 'px';
  mainEl.appendChild(ripple);
  setTimeout(function() { ripple.remove(); }, 1300);
}

// ========== Toast ==========
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}
</script>
